<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ID入力 | QR Viewer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>ID番号入力</h1>
        <p class="description">8桁の数字を入力すると、QRコードを表示します。</p>

        <form id="id-form" novalidate>
          <label for="id-number">ID番号（8桁）</label>
          <input
            id="id-number"
            name="id-number"
            type="text"
            inputmode="numeric"
            autocomplete="one-time-code"
            pattern="\\d{8}"
            maxlength="8"
            placeholder="20260291"
            aria-describedby="error-message"
            required
          />
          <p id="error-message" class="error" aria-live="polite"></p>

          <button type="submit" class="primary">保存してQRを表示</button>
        </form>
      </section>
    </main>

    <script src="js/cookies.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
