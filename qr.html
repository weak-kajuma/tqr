<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR表示 | QR Viewer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card qr-card">
        <header class="qr-header">
          <h1>QRコード</h1>
          <p class="description">ピンチイン/アウトで拡大縮小できます。</p>
        </header>

        <div class="zoom-controls" aria-label="ズームコントロール">
          <button type="button" id="zoom-out" aria-label="縮小">−</button>
          <button type="button" id="zoom-reset" aria-label="リセット">100%</button>
          <button type="button" id="zoom-in" aria-label="拡大">＋</button>
        </div>

        <div class="qr-stage" id="qr-stage">
          <div id="qr-box" class="qr-box" role="img" aria-label="ID番号のQRコード"></div>
        </div>

        <p class="id-label">ID: <strong id="id-value"></strong></p>

        <div class="actions">
          <a class="secondary" href="index.html">IDを再入力</a>
          <button type="button" id="clear-id" class="danger">保存したIDを削除</button>
        </div>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="js/cookies.js"></script>
    <script src="js/qr.js"></script>
  </body>
</html>
